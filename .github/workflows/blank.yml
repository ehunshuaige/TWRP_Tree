name: Make TWRP Device (Android 15 Optimized)

on:
  workflow_dispatch:
    inputs:
      IMGURL:
        description: 'URL of initboot.img (Android 15 REQUIRED)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download initboot.img
      run: |
        curl -L -o initboot.img "${{ github.event.inputs.IMGURL }}"
        echo "Downloaded initboot.img:"
        file initboot.img

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget unzip python3 python3-pip cpio
        pip3 install requests

    - name: Clone Magisk
      run: |
        git clone https://github.com/topjohnwu/Magisk.git
        cd Magisk
        git submodule update --init --recursive

    - name: Install NDK
      working-directory: Magisk
      run: |
        # Magisk 使用 ondk，环境变量为 ONDK_HOME
        export ONDK_HOME=$PWD/ndk
        python3 build.py ndk

        # 检查是否安装到预期目录
        if [ ! -d "$ONDK_HOME" ]; then
          echo "ONDK_HOME directory not found, trying to locate NDK automatically..."
          # 查找 ndk-build 所在目录
          REAL_NDK=$(find . -maxdepth 3 -name "ndk-build" -type f 2>/dev/null | head -1 | xargs dirname)
          if [ -n "$REAL_NDK" ]; then
            echo "Found NDK at $REAL_NDK"
            ln -sf "$REAL_NDK" ndk
            ONDK_HOME=$PWD/ndk
          else
            echo "Cannot locate NDK anywhere, aborting."
            exit 1
          fi
        fi

        echo "NDK ready at $ONDK_HOME"
        echo "ANDROID_NDK_HOME=$ONDK_HOME" >> $GITHUB_ENV

    - name: Build Magisk
      working-directory: Magisk
      run: |
        python3 build.py native
        echo "Build completed. Checking output:"
        find . -name "magiskboot" -type f

    - name: Copy magiskboot
      run: |
        find Magisk -name "magiskboot" -type f -exec cp {} . \;
        [ -f "magiskboot" ] || { echo "magiskboot not found"; exit 1; }
        file magiskboot

    - name: Extract device tree
      run: |
        ./magiskboot unpack initboot.img
        [ -f "kernel_dtb" ] && mv kernel_dtb devicetree.dtb || [ -f "dtb" ] && mv dtb devicetree.dtb || { echo "No dtb found"; exit 1; }
        file devicetree.dtb

    - name: Repack initboot.img
      run: |
        ./magiskboot repack initboot.img
        [ -f "new-boot.img" ] || { echo "Repack failed"; exit 1; }
        mv new-boot.img newinitboot.img

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: twrp-device-tree
        path: |
          devicetree.dtb
          newinitboot.img
        retention-days: 30

    - name: Generate build report
      run: |
        echo "## Build Report" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Success" >> $GITHUB_STEP_SUMMARY
        echo "- **Device Tree**: devicetree.dtb" >> $GITHUB_STEP_SUMMARY
        echo "- **Repacked Image**: newinitboot.img" >> $GITHUB_STEP_SUMMARY
